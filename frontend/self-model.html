<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TamAGI — World Model</title>
<style>
:root{
  --bg-base:#0a0d13;--bg-panel:#10151e;--bg-elevated:#161c27;
  --border:#1e2a3a;--border-hover:#2a3a50;
  --text-main:#c5cdd8;--text-secondary:#6b7a8d;--text-dim:#3d4f63;
  --nc-location:#67e8f9;--nc-quest:#4da6ff;--nc-event:#ff9f43;
  --nc-skill:#3ddc84;--nc-perk:#ffd866;--nc-known:#c084fc;
  --nc-mystery:#ff6b6b;--nc-lore:#4ecca3;
  --font-mono:'JetBrains Mono','Fira Code','SF Mono',monospace;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg-base);color:var(--text-main);font-family:var(--font-sans)}
.app{display:grid;grid-template-rows:44px minmax(0,1fr);height:100vh}
.header{background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;overflow:hidden}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--nc-lore);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--text-secondary);font-weight:400}
.sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.toggles{display:flex;gap:3px;flex-wrap:nowrap;overflow:hidden}
.toggle{font-family:var(--font-mono);font-size:9px;padding:2px 6px;border-radius:3px;cursor:pointer;border:1px solid;opacity:.25;transition:opacity .15s;user-select:none;white-space:nowrap}
.toggle.on{opacity:1}
.toggle[data-t=location]{color:var(--nc-location);border-color:var(--nc-location)}
.toggle[data-t=quest]{color:var(--nc-quest);border-color:var(--nc-quest)}
.toggle[data-t=event]{color:var(--nc-event);border-color:var(--nc-event)}
.toggle[data-t=skill]{color:var(--nc-skill);border-color:var(--nc-skill)}
.toggle[data-t=perk]{color:var(--nc-perk);border-color:var(--nc-perk)}
.toggle[data-t=known]{color:var(--nc-known);border-color:var(--nc-known)}
.toggle[data-t=mystery]{color:var(--nc-mystery);border-color:var(--nc-mystery)}
.toggle[data-t=lore]{color:var(--nc-lore);border-color:var(--nc-lore)}
.stats{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);white-space:nowrap;margin-left:auto;flex-shrink:0}
.stats .val{color:var(--text-main)}
.back-link{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);text-decoration:none;white-space:nowrap;flex-shrink:0;padding:4px 8px;border:1px solid var(--border);border-radius:3px;transition:color .15s,border-color .15s}
.back-link:hover{color:var(--nc-lore);border-color:var(--nc-lore)}
.refresh-btn{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:3px;background:none;transition:color .15s;flex-shrink:0}
.refresh-btn:hover{color:var(--text-secondary)}
.main{display:grid;grid-template-columns:minmax(0,1fr) 280px;height:100%;background:var(--border);gap:1px}
.graph-area{background:var(--bg-base);position:relative;overflow:hidden}
#graph-svg{display:block;width:100%;height:100%;cursor:grab}
#graph-svg:active{cursor:grabbing}
.graph-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);pointer-events:none}
.inspector{background:var(--bg-panel);display:flex;flex-direction:column;overflow:hidden}
.inspector-header{padding:10px 12px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);flex-shrink:0}
.inspector-empty{padding:20px 12px;color:var(--text-dim);font-family:var(--font-mono);font-size:10px;text-align:center;line-height:1.8}
.inspector-body{flex:1;overflow-y:auto;padding:8px 12px;min-height:0}
.inspector-body::-webkit-scrollbar{width:3px}
.inspector-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.field{margin-bottom:9px}
.field-label{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.field-value{font-family:var(--font-mono);font-size:11px;color:var(--text-main);word-break:break-word;line-height:1.4}
.field-value.prose{color:var(--text-secondary);font-size:11px;font-family:var(--font-sans);word-break:normal;line-height:1.55;font-style:italic}
.type-badge{display:inline-block;padding:1px 7px;border-radius:3px;font-family:var(--font-mono);font-size:9px;border:1px solid;margin-bottom:9px;letter-spacing:.5px}
.bar-track{height:3px;background:var(--border);border-radius:2px;margin-top:4px}
.bar-fill{height:3px;border-radius:2px}
.prof-pips{display:flex;gap:4px;margin-top:5px}
.prof-pip{width:22px;height:4px;border-radius:2px;background:var(--border)}
.prof-pip.on{background:var(--nc-skill)}
.edges-section{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.edges-label{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.edge-item{font-family:var(--font-mono);font-size:10px;padding:2px 0;display:flex;gap:6px;align-items:baseline;line-height:1.5}
.edge-arrow{color:var(--text-dim);flex-shrink:0}
.edge-type-lbl{flex-shrink:0;font-size:9px}
.edge-peer{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.edge-peer:hover{color:var(--text-main)!important}
.tooltip{position:fixed;background:var(--bg-elevated);border:1px solid var(--border-hover);border-radius:4px;padding:7px 10px;font-family:var(--font-mono);font-size:10px;color:var(--text-main);max-width:260px;pointer-events:none;z-index:100;display:none;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.hint{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">TamAGI <span>/ World Model</span></div>
    <div class="sep"></div>
    <div class="toggles" id="toggles"></div>
    <div class="stats">Nodes: <span class="val" id="nc">–</span> &middot; Edges: <span class="val" id="ec">–</span></div>
    <button class="refresh-btn" onclick="reload()" title="Refresh">&#x21BA;</button>
    <a class="back-link" href="/">&#x2190; Back</a>
  </div>
  <div class="main">
    <div class="graph-area" id="graph-area">
      <svg id="graph-svg"><g id="graph-root"></g></svg>
      <div class="graph-empty" id="graph-empty">Loading&#x2026;</div>
      <div class="hint" style="position:absolute;bottom:8px;left:10px">Scroll to zoom &middot; drag to pan &middot; click node to focus &middot; double-click background to reset</div>
    </div>
    <div class="inspector">
      <div class="inspector-header">Inspector</div>
      <div id="inspector-empty" class="inspector-empty">Click any node<br>to inspect it</div>
      <div id="inspector-body" class="inspector-body" style="display:none"></div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
// ── Node type palette ─────────────────────────────────────────
const NC={
  location:'#67e8f9',quest:'#4da6ff',event:'#ff9f43',
  skill:'#3ddc84',perk:'#ffd866',known:'#c084fc',
  mystery:'#ff6b6b',lore:'#4ecca3'
};
const NR={location:12,quest:11,event:9,skill:10,perk:9,known:8,mystery:10,lore:14};

// Edge stroke colors (slightly transparent)
const EC={
  located_at:'#67e8f930',advances:'#4da6ff30',requires:'#ffd86630',
  leads_to:'#ff9f4330',unlocks:'#ffd86648',resolves:'#ff6b6b48',relates_to:'#c084fc30'
};
// Visible edge type label colors for inspector
const EC_VIS={
  located_at:'#67e8f9',advances:'#4da6ff',requires:'#ffd866',
  leads_to:'#ff9f43',unlocks:'#ffd866',resolves:'#ff6b6b',relates_to:'#c084fc'
};

// Weak radial sector per type (degrees, CCW from east) for type clustering
const TYPE_SECTOR={
  lore:270,location:0,quest:45,event:90,
  skill:135,perk:180,known:225,mystery:315
};

// ── State ─────────────────────────────────────────────────────
let visTypes=new Set(Object.keys(NC));
let graphData={nodes:[],edges:[]};
let simNodes=[];   // D3-mutated nodes (have .x .y)
let selectedId=null;
let pinnedId=null;
let sim=null;
let svgSel,gSel,zoom;

// ── Toggles ───────────────────────────────────────────────────
function buildToggles(){
  const c=document.getElementById('toggles');
  Object.entries(NC).forEach(([t])=>{
    const el=document.createElement('span');
    el.className='toggle on';el.dataset.t=t;el.textContent=t;
    el.onclick=()=>{
      visTypes.has(t)?visTypes.delete(t):visTypes.add(t);
      el.classList.toggle('on',visTypes.has(t));
      applyVisibility();
    };
    c.appendChild(el);
  });
}

// ── Label helpers ─────────────────────────────────────────────
function nodeLabel(d){return d.name||d.title||d.domain||d.context||d.id}
function short(s,n=15){return s.length>n?s.slice(0,n-1)+'…':s}

// ── Graph build ───────────────────────────────────────────────
function buildGraph(data){
  const area=document.getElementById('graph-area');
  const W=area.clientWidth||800,H=area.clientHeight||600;

  // Deep-copy so D3 can mutate
  const nodes=data.nodes.map(d=>({...d}));
  const nodeIds=new Set(nodes.map(n=>n.id));
  const edges=data.edges
    .filter(e=>nodeIds.has(e.source)&&nodeIds.has(e.target))
    .map(e=>({...e}));

  // Seed node: lore-world → any lore → node with most edges → first
  const edgeDeg={};
  edges.forEach(e=>{edgeDeg[e.source]=(edgeDeg[e.source]||0)+1;edgeDeg[e.target]=(edgeDeg[e.target]||0)+1});
  let seed=nodes.find(n=>n.id==='lore-world')
    ||nodes.find(n=>n.node_type==='lore')
    ||nodes.slice().sort((a,b)=>(edgeDeg[b.id]||0)-(edgeDeg[a.id]||0))[0];

  if(seed){seed.fx=W/2;seed.fy=H/2;pinnedId=seed.id}

  if(sim)sim.stop();

  const CLUSTER_R=Math.min(W,H)*0.22;

  sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(95).strength(0.7))
    .force('charge',d3.forceManyBody().strength(-300).distanceMax(400))
    .force('collide',d3.forceCollide(d=>(NR[d.node_type]||9)+15).strength(0.8))
    .force('center',d3.forceCenter(W/2,H/2).strength(0.05))
    // Weak type-sector clustering for radial grouping
    .force('sectX',d3.forceX(d=>{
      if(d.id===pinnedId)return W/2;
      const a=(TYPE_SECTOR[d.node_type]??0)*Math.PI/180;
      return W/2+Math.cos(a)*CLUSTER_R;
    }).strength(0.03))
    .force('sectY',d3.forceY(d=>{
      if(d.id===pinnedId)return H/2;
      const a=(TYPE_SECTOR[d.node_type]??0)*Math.PI/180;
      return H/2+Math.sin(a)*CLUSTER_R;
    }).strength(0.03));

  simNodes=nodes;
  renderD3(nodes,edges);
}

function renderD3(nodes,edges){
  const svgEl=document.getElementById('graph-svg');
  d3.select('#graph-root').selectAll('*').remove();

  zoom=d3.zoom().scaleExtent([0.08,8])
    .on('zoom',e=>d3.select('#graph-root').attr('transform',e.transform));
  svgSel=d3.select(svgEl).call(zoom);
  gSel=d3.select('#graph-root');

  // Double-click background → reset view
  svgSel.on('dblclick.zoom',null)
    .on('dblclick',()=>svgSel.transition().duration(450).call(zoom.transform,d3.zoomIdentity));

  // Edges
  const link=gSel.append('g').selectAll('line').data(edges).join('line')
    .attr('class','e-line')
    .attr('stroke',d=>EC[d.edge_type]||'#1e2a3a')
    .attr('stroke-width',1.5)
    .attr('pointer-events','none');

  // Nodes
  const node=gSel.append('g').selectAll('g').data(nodes).join('g')
    .attr('class','n-grp')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{
        if(!e.active)sim.alphaTarget(0);
        // Only release drag if not the pinned seed
        if(d.id!==pinnedId){d.fx=null;d.fy=null}
      }));

  node.append('circle')
    .attr('r',d=>NR[d.node_type]||9)
    .attr('fill',d=>NC[d.node_type]||'#888')
    .attr('stroke',d=>NC[d.node_type]||'#888')
    .attr('stroke-width',d=>d.id===pinnedId?3:2)
    .attr('opacity',d=>{
      if(d.status==='abandoned')return 0.25;
      if(d.status==='complete')return 0.5;
      return d.id===pinnedId?1:0.85;
    })
    .style('cursor','pointer')
    .on('click',(e,d)=>{e.stopPropagation();pickNode(d)})
    .on('mouseenter',(e,d)=>showTip(e,d))
    .on('mouseleave',hideTip)
    .on('mousemove',moveTip);

  // Seed ring glow
  gSel.selectAll('.n-grp').filter(d=>d.id===pinnedId)
    .append('circle')
    .attr('r',d=>(NR[d.node_type]||9)+5)
    .attr('fill','none')
    .attr('stroke',d=>NC[d.node_type]||'#4ecca3')
    .attr('stroke-width',1)
    .attr('opacity',0.25)
    .attr('pointer-events','none');

  node.append('text')
    .attr('text-anchor','middle')
    .attr('font-family','JetBrains Mono,Fira Code,SF Mono,monospace')
    .attr('font-size',9)
    .attr('fill','#6b7a8d')
    .attr('y',d=>(NR[d.node_type]||9)+10)
    .attr('pointer-events','none')
    .text(d=>short(nodeLabel(d)));

  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x??0},${d.y??0})`);
  });

  updateRing();
  applyVisibility();
}

function updateRing(){
  if(!gSel)return;
  gSel.selectAll('.n-grp circle:first-child')
    .attr('stroke-width',d=>d.id===selectedId?3:d.id===pinnedId?3:2)
    .attr('stroke',d=>d.id===selectedId?'#fff':NC[d.node_type]||'#888')
    .attr('opacity',d=>{
      if(d.id===selectedId)return 1;
      if(d.status==='abandoned')return 0.25;
      if(d.status==='complete')return 0.5;
      return d.id===pinnedId?1:0.85;
    });
}

function applyVisibility(){
  if(!gSel)return;
  gSel.selectAll('.n-grp').style('display',d=>visTypes.has(d.node_type)?null:'none');
  gSel.selectAll('.e-line').style('display',d=>{
    const s=typeof d.source==='object'?d.source:null;
    const t=typeof d.target==='object'?d.target:null;
    return s&&t&&visTypes.has(s.node_type)&&visTypes.has(t.node_type)?null:'none';
  });
}

function centerOn(d){
  const el=document.getElementById('graph-svg');
  const W=el.clientWidth,H=el.clientHeight;
  const k=1.8;
  svgSel.transition().duration(480)
    .call(zoom.transform,d3.zoomIdentity
      .translate(W/2-d.x*k,H/2-d.y*k).scale(k));
}

function pickNode(d){
  selectedId=d.id;
  updateRing();
  centerOn(d);
  loadInspector(d.id);
}

function pickById(id){
  selectedId=id;
  updateRing();
  const d=simNodes.find(n=>n.id===id);
  if(d&&d.x!=null)centerOn(d);
  loadInspector(id);
}

// ── Tooltip ───────────────────────────────────────────────────
function showTip(e,d){
  const tip=document.getElementById('tooltip');
  const col=NC[d.node_type]||'#ccc';
  const lbl=nodeLabel(d);
  let h=`<strong style="color:${col}">${esc(lbl)}</strong>`;
  const desc=d.description||d.atmosphere||'';
  if(desc)h+=`<br><span style="color:var(--text-secondary)">${esc(desc.slice(0,100))}${desc.length>100?'…':''}</span>`;
  if(d.status)h+=`<br><span style="color:var(--text-dim)">${esc(d.status)}</span>`;
  if(d.proficiency)h+=`<br><span style="color:var(--text-dim)">${esc(d.proficiency)}</span>`;
  if(d.entropy_score!=null)h+=`<br><span style="color:var(--nc-mystery)">entropy ${d.entropy_score.toFixed(2)}</span>`;
  if(d.confidence!=null)h+=`<br><span style="color:var(--nc-known)">conf ${d.confidence.toFixed(2)}</span>`;
  tip.innerHTML=h;tip.style.display='block';moveTip(e);
}
function moveTip(e){const tip=document.getElementById('tooltip');tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px'}
function hideTip(){document.getElementById('tooltip').style.display='none'}

// ── Inspector ─────────────────────────────────────────────────
async function loadInspector(id){
  try{
    const r=await fetch(`/api/self-model/node/${encodeURIComponent(id)}`);
    if(!r.ok)throw new Error(r.status);
    const{node,edges}=await r.json();
    document.getElementById('inspector-empty').style.display='none';
    const body=document.getElementById('inspector-body');
    body.style.display='block';
    const col=NC[node.node_type]||'#888';
    let h=`<span class="type-badge" style="color:${col};border-color:${col}40">${esc(node.node_type||'?')}</span>`;

    // Primary label (name/title when different from id)
    const lbl=node.name||node.title||'';
    if(lbl&&lbl!==node.id)
      h+=`<div class="field"><div class="field-value" style="color:${col};font-size:13px">${esc(lbl)}</div></div>`;

    // Description / prose
    if(node.description)
      h+=`<div class="field"><div class="field-value prose">${esc(node.description)}</div></div>`;
    if(node.atmosphere)
      h+=`<div class="field"><div class="field-label">atmosphere</div><div class="field-value prose">${esc(node.atmosphere)}</div></div>`;

    // Status (quest)
    if(node.status){
      const sc={active:'var(--nc-skill)',complete:'var(--text-dim)',discovered:'var(--nc-quest)',abandoned:'var(--nc-mystery)'}[node.status]||'var(--text-secondary)';
      h+=`<div class="field"><div class="field-label">status</div><div class="field-value" style="color:${sc}">${esc(node.status)}</div></div>`;
    }

    // Proficiency pips (skill)
    if(node.proficiency){
      const levels=['novice','practiced','fluent'];
      const idx=levels.indexOf(node.proficiency)+1;
      h+=`<div class="field"><div class="field-label">proficiency</div><div class="field-value" style="color:var(--nc-skill)">${esc(node.proficiency)}</div>`;
      h+=`<div class="prof-pips">${levels.map((_,i)=>`<div class="prof-pip${i<idx?' on':''}"></div>`).join('')}</div></div>`;
    }

    // Confidence bar (known)
    if(node.confidence!=null){
      const pct=Math.round(node.confidence*100);
      h+=`<div class="field"><div class="field-label">confidence</div><div class="field-value">${node.confidence.toFixed(3)}</div>`;
      h+=`<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--nc-known)"></div></div></div>`;
    }

    // Entropy bar (mystery)
    if(node.entropy_score!=null){
      const pct=Math.round(node.entropy_score*100);
      h+=`<div class="field"><div class="field-label">entropy</div><div class="field-value">${node.entropy_score.toFixed(3)}</div>`;
      h+=`<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--nc-mystery)"></div></div></div>`;
    }

    // Context (lore)
    if(node.context)
      h+=`<div class="field"><div class="field-label">context</div><div class="field-value" style="color:var(--nc-lore)">${esc(node.context)}</div></div>`;

    // Domain (mystery)
    if(node.domain)
      h+=`<div class="field"><div class="field-label">domain</div><div class="field-value">${esc(node.domain)}</div></div>`;

    // Evidence (known)
    if(node.evidence_count!=null)
      h+=`<div class="field"><div class="field-label">evidence</div><div class="field-value">${node.evidence_count} observation${node.evidence_count!==1?'s':''}</div></div>`;

    // Usage stats (skill)
    if(node.usage_count!=null)
      h+=`<div class="field"><div class="field-label">usage</div><div class="field-value">${node.usage_count} uses &middot; ${node.success_count??0} successful</div></div>`;

    // ID + created
    h+=`<div class="field"><div class="field-label">id</div><div class="field-value" style="color:var(--text-dim);font-size:10px">${esc(node.id)}</div></div>`;
    if(node.created_at)
      h+=`<div class="field"><div class="field-label">created</div><div class="field-value" style="color:var(--text-dim)">${esc(node.created_at.slice(0,19).replace('T',' '))}</div></div>`;

    // Edges
    if(edges&&edges.length){
      h+=`<div class="edges-section"><div class="edges-label">Edges (${edges.length})</div>`;
      edges.forEach(e=>{
        const out=e.source===id;
        const peer=out?e.target:e.source;
        const peerNode=graphData.nodes.find(n=>n.id===peer);
        const peerCol=NC[peerNode?.node_type]||'var(--text-secondary)';
        const etCol=EC_VIS[e.edge_type]||'var(--text-secondary)';
        h+=`<div class="edge-item">`;
        h+=`<span class="edge-arrow">${out?'&#8594;':'&#8592;'}</span>`;
        h+=`<span class="edge-type-lbl" style="color:${etCol}">${esc(e.edge_type)}</span>`;
        h+=`<span class="edge-peer" style="color:${peerCol}" onclick="pickById('${esc(peer)}')" title="${esc(peer)}">${esc(short(peer,22))}</span>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    body.innerHTML=h;
  }catch{
    document.getElementById('inspector-body').innerHTML=`<div class="field-value" style="color:var(--nc-mystery)">Failed to load node</div>`;
  }
}

function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

// ── Data load ─────────────────────────────────────────────────
async function reload(){
  const empty=document.getElementById('graph-empty');
  empty.style.display='flex';empty.textContent='Loading…';
  try{
    const r=await fetch('/api/self-model/graph');
    if(r.status===401){location.href='/login';return}
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    graphData={nodes:data.nodes||[],edges:data.edges||[]};
    document.getElementById('nc').textContent=data.node_count??graphData.nodes.length;
    document.getElementById('ec').textContent=data.edge_count??graphData.edges.length;
    if(!graphData.nodes.length){empty.textContent='No nodes in world graph yet.';return}
    empty.style.display='none';
    buildGraph(graphData);
    if(selectedId)loadInspector(selectedId);
  }catch{
    empty.style.display='flex';
    empty.textContent='Failed to load graph. Is TamAGI running?';
  }
}

buildToggles();
reload();
setInterval(reload,30000);
window.addEventListener('resize',()=>{if(graphData.nodes.length)buildGraph(graphData)});
</script>
</body>
</html>
