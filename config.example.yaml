# ═══════════════════════════════════════════
# TamAGI Configuration
# ═══════════════════════════════════════════

# LLM Backend Configuration
# Supports any OpenAI-compatible v1/chat/completions API
llm:
  base_url: "http://localhost:11434/v1"     # Ollama default
  api_key: "ollama"                         # Use "ollama" for Ollama, or your API key
  model: "ministral-3:14b"                  # Model identifier
  temperature: 0.15                         # Lower = more focused/responsive, Higher = more creative/verbose. Match Model's card on Hugging Face for best results.
  max_tokens: 2048                          # Max tokens in LLM response. Adjust based on your model's context window and needs.             
  timeout: 180                              # Request timeout in seconds
  # Ollama context window size (num_ctx). Without this, Ollama uses the model's
  # compiled default which varies and may silently truncate long conversations.
  # Check your model page for the supported context length. Ministral-3:14b
  # supports up to 128k, but a smaller value reduces VRAM pressure.
  num_ctx: 32768

# Server Configuration
server:
  host: "0.0.0.0"
  port: 7741
  workers: 1
auth:
  enabled: false                            # False for development/internal use
  password_hash: ""                         # Written by /api/auth/setup — do not edit manually

# Memory Configuration
memory:
  backend: "chromadb"                       # chromadb | elasticsearch
  # How many memories to surface per recall query
  retrieval_limit: 5
  # Minimum cosine similarity to include a result (0.0 = permissive, 1.0 = exact)
  relevance_threshold: 0.5

  chromadb:
    persist_directory: "./data/chromadb"
    collection_name: "tamagi_memory"

  # Elasticsearch backend — switch backend to "elasticsearch" to activate.
  # Requires: pip install elasticsearch sentence-transformers
  # Or start the bundled service: docker compose --profile elasticsearch up -d elasticsearch
  elasticsearch:
    url: "http://localhost:9200"            # ES endpoint (env: TAMAGI_ES_URL)
    index: "tamagi_memory"                  # Index name  (env: TAMAGI_ES_INDEX)
    # Auth — supply api_key OR username+password. Leave blank for no auth (local dev).
    api_key: ""                             # (env: TAMAGI_ES_API_KEY)
    username: ""                            # (env: TAMAGI_ES_USERNAME)
    password: ""                            # (env: TAMAGI_ES_PASSWORD)
    # Embedding model used to generate dense vectors.
    # Must stay consistent after the index is created — changing it requires re-indexing.
    embedding_model: "all-MiniLM-L6-v2"    # 384-dim, ~90 MB, fast


# Guardrails & Permissions
guardrails:
  allowed_read_paths:                       # Paths TamAGI can read from
    - "/workspace"
    - "/workspace/**"
  allowed_write_paths:                      # Paths TamAGI can write to
    - "/workspace"
    - "/workspace/**"
  exec_trust:                               # Tiered trust model (base command name level)
    safe:    ["ls","cat","head","tail","grep","find","wc","echo","date","pwd","which","env","ps","id","sed","awk"]
    notify:  ["python","python3","pip","pip3","git","curl","wget"]    # run + show in reasoning
    approve: ["docker","docker-compose","npm","make","systemctl","service"]  # inline banner
    block:   ["sudo","su","passwd","rm"]   # always blocked

  # Maximum file size TamAGI can write (bytes)
  max_write_size: 10485760  # 10MB

  # Maximum command execution time (seconds)
  exec_timeout: 120

# Workspace
workspace:
  path: "/workspace"

# Conversation History
history:
  # Max conversations to keep in-memory
  max_conversations: 100
  # Max messages per conversation
  max_messages_per_conversation: 200
  # Persist to disk
  persist: true
  persist_path: "./data/history"
  # When the total chars of history messages exceeds this, oldest messages are
  # archived to ChromaDB and removed from the active context. They remain
  # semantically searchable via memory recall. Set to 0 to disable.
  # ~96k chars ≈ 24k tokens at 4 chars/token — well under the 32768 num_ctx above.
  context_compress_threshold: 96000

# ── Web Search Configuration ──────────────────
# TamAGI can search the web using multiple providers.
# DuckDuckGo is free and requires no API key.
web_search:
  # Provider: duckduckgo (free) | brave (needs api key) | searxng (self-hosted)
  provider: "duckduckgo"

  # Brave Search API key (get one at https://brave.com/search/api/)
  # Only needed if provider is "brave"
  brave_api_key: ""

  # SearXNG base URL (only needed if provider is "searxng")
  # searxng_url: "http://localhost:8080"

# ── Agent / Tool-Call Behavior ───────────────
agent:
  max_tool_rounds: 20          # Fallback round limit for unplanned tasks
  max_tool_rounds_ceiling: 40  # Hard cap when plan drives the limit (estimated_steps * 1.5)
  use_plan_executor: false     # Set true to step through ActionPlan via PlanExecutor (requires WS)
  llm_retry_attempts: 1        # Retries on server disconnect (RemoteProtocolError / ConnectError)
  llm_retry_delay: 2.0         # Seconds between retries

# ── Autonomy ─────────────────────────────────
# Controls when TamAGI is free to act on its own — world thread ticks
# and any other autonomous behaviors share this single window.
autonomy:
  enabled: true

  # Cron expression for world thread ticks
  # Examples: "*/30 * * * *" (every 30 min), "0 * * * *" (hourly)
  schedule: "*/15 * * * *"

  # Active window (24h local time). Use 0/24 to run at all hours — no gate.
  active_hours_start: 0
  active_hours_end: 24

  # Minutes to wait before world thread resumes after a user conversation ends
  resume_after_conversation: 15

# ── Living World Thread ───────────────────────
# Technical storage settings. Timing is controlled by autonomy above.
world_thread:
  enabled: true
  thread_max_pairs: 5  # Rolling window: last N tick pairs kept in LLM context

  # Sleep-time consolidation: periodically distills accumulated lived experience
  # (world-thread monologue + self-model graph) into the agent's own SOUL.md, and
  # nudges the IDENTITY.md "Stage". This is context-level persistence — "who you've
  # become" — independent of any weight training. The merge is non-destructive.
  consolidation:
    enabled: true
    every_n_ticks: 12        # Consolidate after this many new autonomous ticks
    max_ticks_per_run: 60    # Cap on lived-experience ticks fed to the pass
    min_soul_retention: 0.5  # Reject a rewrite shorter than this fraction of SOUL.md

# ── Identity Files ────────────────────────────
# IDENTITY.md (who you are), SOUL.md (why you are), and USER.md (source of truth
# about the user) are injected into every system prompt in full, so each is capped.
# Detail belongs in supplemental files (named in USER.md) + memory/RAG, not here.
identity_files:
  file_char_limit: 2000    # Hard cap (characters) enforced on each core file

# ── Relational Consolidation ──────────────────
# Distills conversation history into USER.md (the capped source of truth) plus a
# named, uncapped supplemental relationship file (read on demand, not injected).
# Runs after every N ended conversations, and on demand via
# POST /api/world/consolidate-relational.
relational:
  enabled: true
  every_n_conversations: 3
  max_dialogue_chars: 8000
  supplemental_filename: "relationship.md"

# ── Multi-Agent Orchestration ─────────────────
# When TamAGI encounters a complex multi-step task, it can spawn specialized
# subagents to work in parallel or sequence. It plans the work, delegates,
# reviews results, and synthesizes a final answer — fully autonomous.
orchestrator:
  # Set to false to disable the orchestrate_task skill entirely
  enabled: true

  # Maximum number of subtasks TamAG can delegate per workflow
  max_subagents: 4

  # Max tool-call rounds each subagent is allowed (keep below agent.max_tool_rounds)
  subagent_max_rounds: 3

  # Optional: dedicated LLM for subagents.
  # When set, subagents use this model/endpoint instead of TamAGI's.
  # Useful for pointing subagents at a faster/smaller model to reduce latency.
  # Remove or comment out this block to share TamAGI's LLM (default).
  #
  # subagent_llm:
  #   base_url: "http://localhost:11434/v1"
  #   api_key: "ollama"
  #   model: "granite4:3b"          # faster/cheaper model for worker tasks
  #   temperature: 0.2              # lower = more deterministic tool use
  #   max_tokens: 1024
  #   timeout: 120
  #   num_ctx: 8192                 # smaller context for subagents

# ── MCP Server Integrations ───────────────────
# TamAGI can connect to any MCP-compliant tool server and expose its tools
# as native skills.  Two transports are supported:
#   stdio — spawn a local process (most common; works with npx, uvx, etc.)
#   sse   — connect to a remote HTTP+SSE endpoint
#
# Secret management
# -----------------
# API keys go in the secret store, NOT here.  Use the UI or API to set them:
#
#   curl -X POST http://localhost:7741/api/secrets/BRAVE_API_KEY \
#        -H 'Content-Type: application/json' \
#        -d '{"value": "your-key-here"}'
#
# Secrets are stored in the OS keyring when available (GNOME Keyring,
# macOS Keychain, Windows Credential Vault), or in an Fernet-encrypted
# file at data/secrets.enc otherwise.  Values are injected as subprocess
# env vars at spawn time and are never written into LLM messages.
#
# Reference a stored secret in env by using {secret: NAME} syntax:
#
#   env:
#     BRAVE_API_KEY:
#       secret: BRAVE_API_KEY     # resolved from secret store at startup
#
# For non-sensitive env vars, a plain string works too:
#   env:
#     SOME_FLAG: "true"
#
mcp:
  servers: []
  # ── Example: Home Assistant (stdio via mcp-proxy) ──
  # Exposes your Home Assistant entities and services as MCP tools so TamAGI
  # can query sensors, control lights, etc.
  #
  # Prerequisites:
  #   pip install mcp-proxy          (bridges stdio ↔ Streamable HTTP)
  #   Use the full path in command: if running as a systemd service, e.g.
  #   command: /home/<you>/.local/bin/mcp-proxy  (run `which mcp-proxy` to find it)
  #   Home Assistant 2024.11+        (built-in MCP endpoint at /api/mcp)
  #
  # 1. Generate a Long-Lived Access Token in HA → Profile → Security.
  # 2. Store it in TamAGI's secret store:
  #      Settings UI  →  Secret Store  →  name: HA_ACCESS_TOKEN
  #      — or via API:
  #      curl -X POST http://localhost:7741/api/secrets/HA_ACCESS_TOKEN \
  #           -H 'Content-Type: application/json' \
  #           -d '{"value": "your-token-here"}'
  # 3. Uncomment the block below and set your HA address.
  #
  # - name: home-assistant
  #   transport: stdio
  #   command: mcp-proxy
  #   args:
  #     - "--transport=streamablehttp"
  #     - "--stateless"
  #     - "http://<homeassistant.local>:8123/api/mcp"
  #   env:
  #     API_ACCESS_TOKEN:
  #       secret: HA_ACCESS_TOKEN    # resolved from secret store at startup
  #   # Optional: suppress specific tools that conflict with built-in skills
  #   # or that you simply don't want the model to use.
  #   exclude_tools:
  #     - todo_get_items             # conflicts with TamAGI's built-in task skill
  #     - todo_create_item
  #   # Alternative: only expose the tools you actually want (allowlist).
  #   # include_tools takes precedence over exclude_tools when both are set.
  #   # include_tools:
  #   #   - get_state
  #   #   - call_service
  #
  # ── Example: Filesystem access (stdio via npx) ──
  # No API key needed — exposes read/write tools for a local directory.
  #
  # - name: filesystem
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
  #
  # ── Example: Remote Streamable HTTP / SSE server ──
  #
  # - name: my-remote-tools
  #   transport: sse
  #   url: "http://my-mcp-server:8080/sse"
